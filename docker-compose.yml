version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: fastapi_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: app_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: fastapi_mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: